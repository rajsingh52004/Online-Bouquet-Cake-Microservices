server:
  port: 8084

spring:
  application:
    name: PAYMENT-SERVICE

  datasource:
    url: jdbc:mysql://localhost:3306/bouquet_payment_db
    username: ${DB_USERNAME}
    password:  ${DB_PASSWORD}

  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true

eureka:
  client:
    enabled: false
    razorpay:
  key_id: your_test_key_id
  key_secret: ${JWT_SECRET}