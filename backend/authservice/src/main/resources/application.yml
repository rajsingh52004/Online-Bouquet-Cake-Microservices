server:
  port: 8081

spring:
  application:
    name: AUTH-SERVICE

  datasource:
    url: jdbc:postgresql://localhost:5432/bouquet_auth_db
    username: postgres
    password: your_postgres_password

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

jwt:
  secret: bouquetCakeSecretKeyForJwtAuthenticationMustBeLongEnough123456
  expiration: 86400000
