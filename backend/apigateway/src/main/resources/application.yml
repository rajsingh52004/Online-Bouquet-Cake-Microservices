server:
  port: 9090

spring:
  application:
    name: API-GATEWAY

  cloud:
    gateway:
      routes:

        - id: auth-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/auth/**

        - id: product-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/products/**

        - id: order-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/orders/**

        - id: payment-service
          uri: http://localhost:8084
          predicates:
            - Path=/payments/**

        - id: delivery-service
          uri: http://localhost:8085
          predicates:
            - Path=/deliveries/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka