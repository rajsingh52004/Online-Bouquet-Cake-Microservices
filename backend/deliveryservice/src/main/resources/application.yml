server:
  port: 8085

spring:
  application:
    name: DELIVERY-SERVICE

  datasource:
    url: jdbc:mysql://localhost:3306/bouquet_delivery_db
    username: root
    password: your_mysql_password

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka